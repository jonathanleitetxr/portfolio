<section class="min-h-screen bg-gray-900 text-white flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-gray-800 rounded-xl p-8">
    
    <h1 class="text-2xl font-bold mb-6 text-center text-indigo-400">
      Connexion Admin
    </h1>

    @if (errorMessage()) {
      <div class="bg-red-900 text-red-300 px-4 py-3 rounded-lg mb-4 text-sm">
        {{ errorMessage() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-sm text-gray-400 mb-1">Email</label>
        <input type="email" [(ngModel)]="email" name="email" required
          class="w-full bg-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
      </div>
      <div class="mb-6">
        <label class="block text-sm text-gray-400 mb-1">Mot de passe</label>
        <input type="password" [(ngModel)]="password" name="password" required
          class="w-full bg-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-semibold transition-colors">
        Se connecter
      </button>
    </form>

  </div>
</section>
