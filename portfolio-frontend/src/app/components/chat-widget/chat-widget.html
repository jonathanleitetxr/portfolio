<div class="fixed bottom-6 right-6 z-50">

  @if (!isOpen()) {
    <button (click)="toggleChat()"
      class="bg-indigo-600 hover:bg-indigo-700 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl transition-transform hover:scale-105">
      💬
    </button>
  }

  @if (isOpen()) {
    <div class="bg-gray-800 rounded-xl shadow-2xl w-80 sm:w-96 flex flex-col" style="height: 500px;">

      <div class="flex items-center justify-between p-4 border-b border-gray-700 bg-indigo-700 rounded-t-xl">
        <h3 class="text-white font-semibold text-sm">Assistant Portfolio</h3>
        <button (click)="toggleChat()" class="text-white hover:text-gray-200 text-xl">✕</button>
      </div>

      <div class="flex-1 overflow-y-auto p-4 space-y-3">
        @if (messages().length === 0) {
          <p class="text-gray-400 text-sm text-center mt-4">
            Posez-moi une question sur les compétences, projets ou le parcours de Jonathan !
          </p>
        }

        @for (message of messages(); track $index) {
          <div [class.justify-end]="message.role === 'user'" class="flex">
            <div [class.bg-indigo-600]="message.role === 'user'"
                 [class.bg-gray-700]="message.role === 'assistant'"
                 class="text-white text-sm px-3 py-2 rounded-lg max-w-[80%]">
              {{ message.text }}
            </div>
          </div>
        }

        @if (isLoading()) {
          <div class="flex">
            <div class="bg-gray-700 text-gray-400 text-sm px-3 py-2 rounded-lg">
              En train d'écrire...
            </div>
          </div>
        }
      </div>

      <div class="p-3 border-t border-gray-700">
        <form (ngSubmit)="sendQuestion()" class="flex gap-2">
          <input type="text" [(ngModel)]="currentQuestion" name="question" placeholder="Votre question..."
            class="flex-1 bg-gray-700 rounded-lg px-3 py-2 text-white text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
          <button type="submit" [disabled]="isLoading()"
            class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-600 text-white px-3 py-2 rounded-lg text-sm font-medium">
            ➤
          </button>
        </form>
      </div>

    </div>
  }

</div>
